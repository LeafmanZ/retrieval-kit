<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetrievalKit — Login</title>
<link rel="icon" type="image/jpeg" href="{{ url_for('retrieval_kit.static', filename='images/retrievalkit_icon.png') }}">
<link rel="stylesheet" href="{{ url_for('retrieval_kit.static', filename='css/Roboto_Condensed_400_700_display_swap.css') }}" />
<link rel="stylesheet" href="{{ url_for('retrieval_kit.static', filename='css/font-awesome.6.5.2.all.min.css') }}" />
<style>
  :root {
    --primary-neon: #00ffff;
    --primary-neon-rgb: 0, 255, 255;
    --glass-bg: rgba(22, 28, 41, 0.5);
    --border-color: rgba(0, 255, 255, 0.2);
    --text-color: #ffffff;
    --critical-glow: #FF073A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Roboto Condensed',sans-serif; background:#0a0e17; color:var(--text-color);
    height:100vh; display:flex; align-items:center; justify-content:center;
  }
  body::before {
    content:''; position:fixed; top:0; left:0; width:100vw; height:100vh;
    background-image:
      linear-gradient(rgba(0,255,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.07) 1px, transparent 1px);
    background-size:50px 50px;
    animation:moveGrid 90s linear infinite;
    z-index:-1; pointer-events:none;
  }
  @keyframes moveGrid { from{background-position:0 0} to{background-position:500px 500px} }

  .login-box {
    background:var(--glass-bg); border:1px solid var(--border-color); border-radius:16px;
    padding:40px 36px; width:380px; backdrop-filter:blur(12px);
    box-shadow:0 0 40px rgba(var(--primary-neon-rgb),0.08);
  }
  .login-logo {
    text-align:center; margin-bottom:24px;
  }
  .login-logo i { font-size:32px; color:var(--primary-neon); }
  .login-logo h1 { font-size:20px; color:var(--primary-neon); margin-top:8px; font-weight:700; }
  .login-logo p { font-size:12px; color:#666; margin-top:4px; }

  .login-box input {
    width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--border-color); border-radius:8px;
    padding:12px 14px; color:var(--text-color); font-size:14px; font-family:inherit;
    outline:none; margin-bottom:12px; transition:border-color .2s, box-shadow .2s;
  }
  .login-box input:focus { border-color:var(--primary-neon); box-shadow:0 0 8px rgba(var(--primary-neon-rgb),0.2); }
  .login-box input::placeholder { color:#555; }

  .login-box button {
    width:100%; background:transparent; color:var(--primary-neon); border:1px solid var(--primary-neon);
    border-radius:8px; padding:12px; font-size:14px; cursor:pointer; font-family:inherit;
    font-weight:600; transition:all .2s; margin-bottom:12px;
  }
  .login-box button:hover:not(:disabled) { background:var(--primary-neon); color:#0a0e17; }
  .login-box button:disabled { opacity:.5; cursor:not-allowed; }

  .auth-msg {
    font-size:12px; margin-bottom:12px; text-align:center;
    padding:10px 12px; border-radius:6px; display:none; line-height:1.5;
    color:var(--critical-glow); background:rgba(255,7,58,0.08); border:1px solid rgba(255,7,58,0.2);
  }

  .field-label { font-size:11px; color:#888; margin-bottom:4px; display:block; }

  .login-contact {
    font-size:12px; color:#555; text-align:center; line-height:1.6;
  }
  .login-contact a { color:var(--primary-neon); text-decoration:none; }
  .login-contact a:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <i class="fa-solid fa-database"></i>
    <h1>RetrievalKit</h1>
    <p>Sign in to continue</p>
  </div>

  <div class="auth-msg" id="auth-msg"></div>

  <span class="field-label">Email</span>
  <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">

  <span class="field-label">Password</span>
  <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password">

  <button id="auth-submit" onclick="submitAuth()">Sign In</button>

  {% if register_email %}
  <div class="login-contact">
    Need an account? Contact <a href="mailto:{{ register_email }}?subject=RetrievalKit%20Account%20Request">{{ register_email }}</a>
  </div>
  {% endif %}
</div>

<script>
const RK_API = '{{ api_base }}';

function showError(text) {
  const el = document.getElementById('auth-msg');
  el.textContent = text;
  el.style.display = 'block';
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-msg');
  errEl.style.display = 'none';

  if (!email) { showError('Please enter your email address'); return; }
  if (!password) { showError('Please enter your password'); return; }

  const btn = document.getElementById('auth-submit');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const resp = await fetch(RK_API + '/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password}),
    });
    const data = await resp.json();

    if (!resp.ok) {
      showError(data.error || 'Login failed');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    window.location.href = RK_API + '/';
  } catch {
    showError('Network error — is the server running?');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
document.getElementById('auth-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-password').focus(); });

fetch(RK_API + '/api/auth/me').then(r => r.json()).then(data => {
  if (data.user) window.location.href = RK_API + '/';
}).catch(() => {});
</script>
</body>
</html>
